Nightly:
  cron: "30 2 * * 1-5"
  cron_timezone: "Europe/Madrid"
  ref: main
  variables:
    - variable_type: env_var
      key: CI_DESCRIPTION
      value: "Nightly"
    - variable_type: env_var
      key: NOTIFY_SLACK
      value: "false"
      raw: false

Weekly:
  cron: "00 10 * * 6"
  cron_timezone: "Europe/Madrid"
  ref: main
  active: false
  variables:
    - variable_type: env_var
      key: CI_DESCRIPTION
      value: "Weekly"
    - variable_type: env_var
      key: NOTIFY_SLACK
      value: "false"
      raw: false
