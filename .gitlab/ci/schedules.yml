Nightly:
  cron: "30 2 * * 2-6"
  cron_timezone: "Europe/Madrid"
  ref: main
  active: true

WeeklyEven:
  cron: "00 6 * * sat%2"
  cron_timezone: "Europe/Madrid"
  ref: main
  active: true

WeeklyOdd:
  cron: "00 6 * * sat%2+1"
  cron_timezone: "Europe/Madrid"
  ref: main
  active: true
